version: '3.8'

services:
  chaos-bot:
    build: .
    container_name: chaos-bot
    restart: unless-stopped

    ports:
      - "9010:9010"

    networks:
      - chaos-net

    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      HTTP_SERVER_TOKEN: ${HTTP_SERVER_TOKEN}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POST_REQUEST_WATCHDOG: ${POST_REQUEST_WATCHDOG}

    volumes:
      - ./data:/app/data

networks:
  chaos-net:
    driver: bridge
